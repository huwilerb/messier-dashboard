{% extends "base.html" %}
{% block title %}Connexion &mdash; Messier Marathon{% endblock %}
{% block content %}
<div class="auth-card">
  <h1>Connexion</h1>
  <p class="subtitle">Connectez-vous avec le nom et le mot de passe de votre groupe.</p>

  {% if error %}
    <p class="form-error">{{ error }}</p>
  {% endif %}

  <form method="post" action="/login" class="stacked-form">
    <label class="field-label">Nom du groupe
      <input type="text" name="nom" required autofocus>
    </label>
    <label class="field-label">Mot de passe
      <input type="password" name="password" required>
    </label>
    <button type="submit" class="btn btn-primary">Se connecter</button>
  </form>
</div>
{% endblock %}
